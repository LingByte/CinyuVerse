<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novel CRUD Demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; color: #1f2937; }
    h1 { margin-bottom: 8px; }
    .hint { color: #6b7280; margin-bottom: 20px; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    input, textarea, button { font-size: 14px; padding: 8px; }
    input, textarea { border: 1px solid #d1d5db; border-radius: 6px; }
    textarea { width: 100%; min-height: 72px; }
    button { border: none; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
    button.secondary { background: #4b5563; }
    pre { background: #0b1020; color: #e5e7eb; padding: 12px; border-radius: 8px; overflow: auto; white-space: pre-wrap; }
    .w-full { width: 100%; }
    .muted { color: #6b7280; font-size: 12px; }
    .cover-preview { width: 120px; height: 160px; border: 1px dashed #d1d5db; border-radius: 6px; object-fit: cover; display: block; }
  </style>
</head>
<body>
  <h1>Novel CRUD Demo</h1>
  <div class="hint">可测试小说 CRUD、封面上传（GlobalStore）、AI 生成小说 JSON。</div>

  <div class="card">
    <div class="row">
      <label for="apiBase">API Base：</label>
      <input id="apiBase" class="w-full" />
    </div>
  </div>

  <div class="card">
    <h3>创建小说</h3>
    <div class="row"><input id="title" placeholder="标题(必填)" class="w-full" /></div>
    <div class="row">
      <input id="status" placeholder="状态" />
      <input id="genre" placeholder="类型" />
      <input id="audience" placeholder="受众" />
      <input id="theme" placeholder="主题" />
    </div>
    <div class="row"><input id="tags" placeholder="标签，逗号分隔" class="w-full" /></div>
    <div class="row"><input id="coverImage" placeholder="封面 URL" class="w-full" /></div>
    <div class="row">
      <input id="coverFile" type="file" accept="image/*" />
      <button id="uploadCoverBtn" class="secondary">上传封面并回填 URL</button>
    </div>
    <div class="row"><img id="coverPreview" class="cover-preview" alt="cover preview" /></div>
    <div class="row"><textarea id="description" placeholder="简介"></textarea></div>
    <div class="row"><textarea id="worldSetting" placeholder="世界观设定"></textarea></div>
    <div class="row"><textarea id="styleGuide" placeholder="写作风格指南"></textarea></div>
    <div class="row"><textarea id="referenceNovel" placeholder="参考小说内容"></textarea></div>
    <button id="createBtn">创建</button>
  </div>

  <div class="card">
    <h3>通用操作</h3>
    <div class="row">
      <input id="novelId" placeholder="小说 ID" />
      <button id="getBtn" class="secondary">按 ID 查询</button>
      <button id="updateBtn" class="secondary">更新标题/状态</button>
      <button id="deleteBtn" class="secondary">删除</button>
      <button id="restoreBtn" class="secondary">恢复</button>
    </div>
    <div class="row">
      <input id="newTitle" placeholder="更新用标题（可选）" />
      <input id="newStatus" placeholder="更新用状态（可选）" />
    </div>
    <div class="row">
      <button id="listBtn">分页列表</button>
      <input id="page" placeholder="page" value="1" />
      <input id="size" placeholder="size" value="10" />
      <button id="searchBtn">关键字搜索</button>
      <input id="keyword" placeholder="keyword" />
    </div>
  </div>

  <div class="card">
    <h3>AI 生成小说 JSON</h3>
    <div class="row">
      <input id="aiUserId" placeholder="userId(必填)" value="1" />
      <input id="aiModel" placeholder="model(可选)" />
      <input id="aiMaxTokens" placeholder="maxTokens(默认1800)" value="1800" />
      <input id="aiTemperature" placeholder="temperature(默认0.7)" value="0.7" />
    </div>
    <div class="row">
      <textarea id="aiPrompt" placeholder="描述你要生成的小说，比如：写一本女频古言复仇文，主角成长线清晰，给我可直接入库的小说元信息 JSON。"></textarea>
    </div>
    <div class="row">
      <textarea id="aiFeedback" placeholder="再造意见（可选）：例如把世界观改为赛博修仙，简介更悬疑，保留标题和标签。"></textarea>
    </div>
    <div class="row">
      <input id="aiLockedFields" class="w-full" placeholder="锁定字段（逗号分隔）：title,tags,genre ..." />
    </div>
    <div class="row">
      <button id="aiGenerateBtn">AI 生成 JSON</button>
      <button id="aiRegenerateBtn" class="secondary">基于当前草稿再生成</button>
      <button id="applyAiDraftBtn" class="secondary">导入到创建表单</button>
      <button id="createFromAiBtn" class="secondary">用 AI 草稿直接创建</button>
    </div>
    <div class="row"><pre id="aiDraftOutput">等待 AI 生成...</pre></div>
    <div class="muted">后端要求：AI 接口只接受并返回结构化小说 JSON 草稿。</div>
  </div>

  <div class="card">
    <h3>响应结果</h3>
    <pre id="output">等待请求...</pre>
  </div>

  <script>
    const apiBaseInput = document.getElementById("apiBase");
    const output = document.getElementById("output");
    const aiDraftOutput = document.getElementById("aiDraftOutput");
    let latestAIDraft = null;
    apiBaseInput.value = `${window.location.origin}/api`;

    function getApiBase() {
      return apiBaseInput.value.trim().replace(/\/+$/, "");
    }

    async function request(path, options = {}) {
      const url = `${getApiBase()}${path}`;
      try {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options
        });
        const text = await response.text();
        let json;
        try {
          json = JSON.parse(text);
        } catch {
          json = { raw: text };
        }
        output.textContent = JSON.stringify(
          { status: response.status, statusText: response.statusText, url, body: json },
          null,
          2
        );
      } catch (error) {
        output.textContent = JSON.stringify({ url, error: String(error) }, null, 2);
      }
    }

    function setCreateFormByDraft(draft) {
      if (!draft || typeof draft !== "object") return;
      const map = [
        "title",
        "status",
        "genre",
        "audience",
        "theme",
        "description",
        "worldSetting",
        "tags",
        "coverImage",
        "styleGuide",
        "referenceNovel"
      ];
      for (const key of map) {
        const el = document.getElementById(key);
        if (el) el.value = typeof draft[key] === "string" ? draft[key] : "";
      }
      refreshCoverPreview();
    }

    async function uploadCover() {
      const fileInput = document.getElementById("coverFile");
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      const url = `${getApiBase()}/novels/cover/upload`;
      const form = new FormData();
      form.append("file", file);
      try {
        const response = await fetch(url, {
          method: "POST",
          body: form
        });
        const text = await response.text();
        let json;
        try {
          json = JSON.parse(text);
        } catch {
          json = { raw: text };
        }
        output.textContent = JSON.stringify({ status: response.status, statusText: response.statusText, url, body: json }, null, 2);
        const uploadedURL = json && json.data && json.data.url;
        if (uploadedURL) {
          document.getElementById("coverImage").value = uploadedURL;
          refreshCoverPreview();
        }
      } catch (error) {
        output.textContent = JSON.stringify({ url, error: String(error) }, null, 2);
      }
    }

    function refreshCoverPreview() {
      const img = document.getElementById("coverPreview");
      const url = document.getElementById("coverImage").value.trim();
      img.src = url || "";
    }

    async function generateNovelByAI() {
      const userIdRaw = document.getElementById("aiUserId").value.trim();
      const prompt = document.getElementById("aiPrompt").value.trim();
      if (!userIdRaw || !prompt) return;
      const payload = {
        userId: Number(userIdRaw),
        message: prompt,
        model: document.getElementById("aiModel").value.trim(),
        maxTokens: Number(document.getElementById("aiMaxTokens").value.trim() || "1800"),
        temperature: Number(document.getElementById("aiTemperature").value.trim() || "0.7"),
        feedback: document.getElementById("aiFeedback").value.trim()
      };
      const lockedText = document.getElementById("aiLockedFields").value.trim();
      if (lockedText) {
        payload.lockedFields = lockedText.split(",").map((s) => s.trim()).filter(Boolean);
      }
      const url = `${getApiBase()}/novels/generate`;
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const text = await response.text();
        let json;
        try {
          json = JSON.parse(text);
        } catch {
          json = { raw: text };
        }
        latestAIDraft = json && json.data && json.data.draft ? json.data.draft : null;
        aiDraftOutput.textContent = JSON.stringify(json, null, 2);
        output.textContent = JSON.stringify({ status: response.status, statusText: response.statusText, url, body: json }, null, 2);
      } catch (error) {
        aiDraftOutput.textContent = JSON.stringify({ url, error: String(error) }, null, 2);
      }
    }

    async function regenerateNovelByAI() {
      if (!latestAIDraft) return;
      const userIdRaw = document.getElementById("aiUserId").value.trim();
      const prompt = document.getElementById("aiPrompt").value.trim();
      if (!userIdRaw || !prompt) return;
      const payload = {
        userId: Number(userIdRaw),
        message: prompt,
        model: document.getElementById("aiModel").value.trim(),
        maxTokens: Number(document.getElementById("aiMaxTokens").value.trim() || "1800"),
        temperature: Number(document.getElementById("aiTemperature").value.trim() || "0.7"),
        feedback: document.getElementById("aiFeedback").value.trim(),
        baseDraft: latestAIDraft
      };
      const lockedText = document.getElementById("aiLockedFields").value.trim();
      if (lockedText) {
        payload.lockedFields = lockedText.split(",").map((s) => s.trim()).filter(Boolean);
      }
      const url = `${getApiBase()}/novels/generate`;
      try {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const text = await response.text();
        let json;
        try {
          json = JSON.parse(text);
        } catch {
          json = { raw: text };
        }
        latestAIDraft = json && json.data && json.data.draft ? json.data.draft : null;
        aiDraftOutput.textContent = JSON.stringify(json, null, 2);
        output.textContent = JSON.stringify({ status: response.status, statusText: response.statusText, url, body: json }, null, 2);
      } catch (error) {
        aiDraftOutput.textContent = JSON.stringify({ url, error: String(error) }, null, 2);
      }
    }

    document.getElementById("createBtn").addEventListener("click", () => {
      const payload = {
        title: document.getElementById("title").value,
        status: document.getElementById("status").value,
        genre: document.getElementById("genre").value,
        audience: document.getElementById("audience").value,
        theme: document.getElementById("theme").value,
        description: document.getElementById("description").value,
        worldSetting: document.getElementById("worldSetting").value,
        tags: document.getElementById("tags").value,
        coverImage: document.getElementById("coverImage").value,
        styleGuide: document.getElementById("styleGuide").value,
        referenceNovel: document.getElementById("referenceNovel").value
      };
      request("/novels", { method: "POST", body: JSON.stringify(payload) });
    });
    document.getElementById("uploadCoverBtn").addEventListener("click", uploadCover);
    document.getElementById("coverImage").addEventListener("input", refreshCoverPreview);

    document.getElementById("getBtn").addEventListener("click", () => {
      const id = document.getElementById("novelId").value.trim();
      if (!id) return;
      request(`/novels/${id}`);
    });

    document.getElementById("updateBtn").addEventListener("click", () => {
      const id = document.getElementById("novelId").value.trim();
      if (!id) return;
      const payload = {
        title: document.getElementById("newTitle").value,
        status: document.getElementById("newStatus").value
      };
      request(`/novels/${id}`, { method: "PUT", body: JSON.stringify(payload) });
    });

    document.getElementById("deleteBtn").addEventListener("click", () => {
      const id = document.getElementById("novelId").value.trim();
      if (!id) return;
      request(`/novels/${id}`, { method: "DELETE" });
    });

    document.getElementById("restoreBtn").addEventListener("click", () => {
      const id = document.getElementById("novelId").value.trim();
      if (!id) return;
      request(`/novels/${id}/restore`, { method: "POST" });
    });

    document.getElementById("listBtn").addEventListener("click", () => {
      const page = document.getElementById("page").value.trim() || "1";
      const size = document.getElementById("size").value.trim() || "10";
      request(`/novels?page=${encodeURIComponent(page)}&size=${encodeURIComponent(size)}`);
    });

    document.getElementById("searchBtn").addEventListener("click", () => {
      const keyword = document.getElementById("keyword").value.trim();
      if (!keyword) return;
      request(`/novels/search?keyword=${encodeURIComponent(keyword)}`);
    });

    document.getElementById("aiGenerateBtn").addEventListener("click", generateNovelByAI);
    document.getElementById("aiRegenerateBtn").addEventListener("click", regenerateNovelByAI);
    document.getElementById("applyAiDraftBtn").addEventListener("click", () => {
      if (!latestAIDraft) return;
      setCreateFormByDraft(latestAIDraft);
    });
    document.getElementById("createFromAiBtn").addEventListener("click", () => {
      if (!latestAIDraft) return;
      setCreateFormByDraft(latestAIDraft);
      document.getElementById("createBtn").click();
    });
    refreshCoverPreview();
  </script>
</body>
</html>
